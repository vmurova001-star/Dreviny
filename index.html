<!DOCTYPE html>
<html lang="cs">

    <meta charset="UTF-8">

    <style>

        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 10px; min-height: 100vh; user-select: none; }
        
        /* OPRAVA: Results screen je nyní defaultně úplně odstraněn z toku, aby neblokoval klikání */
        #menu-screen { position: fixed; inset: 0; background: #f4f7f6; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; overflow-y: auto; }
        #results-screen { display: none; position: fixed; inset: 0; background: white; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; padding: 20px; }
        
        .menu-title { color: var(--dark-green); margin-bottom: 5px; font-size: 2rem; }
        .menu-section { margin-bottom: 15px; width: 100%; max-width: 360px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .menu-section p { font-weight: bold; margin-bottom: 10px; color: #555; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .global-settings { background: #eef2f3; border: 2px solid var(--blue); }
        .mode-toggle { display: flex; gap: 5px; background: #ddd; padding: 5px; border-radius: 12px; margin-bottom: 5px; }
        .btn-mode { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: transparent; transition: 0.3s; }
        .btn-mode.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--blue); }
        
        .btn-menu { padding: 15px; border-radius: 12px; border: 2px solid var(--dark-green); background: white; color: var(--dark-green); font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-menu:hover { background: var(--dark-green); color: white; }
        
        .checkbox-group { text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; padding: 6px; background: #fafafa; border-radius: 8px; }
        
        input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ccc; text-align: center; font-size: 1.1rem; box-sizing: border-box; }

        .header-stats { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-weight: bold; }
        .stat-box { padding: 6px 12px; border-radius: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.9rem; min-width: 50px; text-align: center; border: 2px solid #eee; }
        .btn-home { background: white; border: 2px solid #ccc; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        
        .card-container { width: 320px; height: 420px; perspective: 1000px; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; background: white; border: 4px solid var(--dark-green); box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
        
        .card-front .img-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .card-front img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-back { transform: rotateY(180deg); }
        .card-back .cz-name { font-size: 1.8rem; font-weight: bold; color: #1b3d17; margin-bottom: 10px; text-align: center; }
        .card-back .lat-wrapper { border-top: 1px solid #ccc; margin-top: 15px; width: 90%; display: flex; align-items: center; justify-content: center; gap: 10px; padding-top: 15px; }
        .card-back .lat-name { font-size: 1.3rem; font-style: italic; color: #555; }
        
        .btn-speak { background: #eee; border: none; font-size: 1.2rem; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--blue); background: white; color: var(--blue); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-pill { padding: 10px 25px; border-radius: 30px; background: white; font-size: 20px; cursor: pointer; border: 2px solid #ddd; min-width: 70px; }
        .btn-wrong.active { background: var(--red); color: white; border-color: var(--red); }
        .btn-correct.active { background: var(--green); color: white; border-color: var(--green); }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 class="menu-title">🌿 Poznávačka Dřevin</h1>
        
        <div class="menu-section global-settings">
            <p>1. Nastavení pořadí:</p>
            <div class="mode-toggle">
                <button id="mode-linear" class="btn-mode active" onclick="setOrder('linear')">Popořadě</button>
                <button id="mode-random" class="btn-mode" onclick="setOrder('random')">Náhodně</button>
            </div>
        </div>

        <div class="menu-section">
            <p>2. Výběr sekcí:</p>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="jehličnany" checked onchange="updateCatCount()"> Jehličnany</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="listnáče" checked onchange="updateCatCount()"> Listnáče</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="ovoce" checked onchange="updateCatCount()"> Ovocné</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="keře" checked onchange="updateCatCount()"> Keře</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="vrby" checked onchange="updateCatCount()"> Vrby/Jilmy</label>
            </div>
            <button id="btn-start-custom" class="btn-menu" style="background: var(--dark-green); color: white;" onclick="startCustom()">Spustit výběr (Počet: 100)</button>
        </div>

        <div class="menu-section">
            <p>3. Vlastní počet (max. 100):</p>
            <input type="number" id="customAmount" value="100" oninput="if(this.value > 100) this.value = 100; if(this.value < 1) this.value = 1;">
            <button class="btn-menu" style="border-color: var(--blue); color: var(--blue);" onclick="startFlow(document.getElementById('customAmount').value)">Spustit vlastní počet</button>
            <button class="btn-menu" style="background: #34495e; color: white; border: none;" onclick="startFlow(100)">Spustit vše (100)</button>
        </div>
    </div>

    <div class="header-stats">
        <button class="btn-home" onclick="goHome()">🏠</button>
        <div class="stat-box" id="counter" style="color:var(--blue); border-color:var(--blue);">1 / --</div>
        <div class="stat-box" id="wrong-count" style="color:var(--red); border-color:var(--red);">✕ 0</div>
        <div class="stat-box" id="correct-count" style="color:var(--green); border-color:var(--green);">0 ✓</div>
    </div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="handleCardClick(event, this)">
            <div class="card-face card-front">
                <div class="img-container"><img id="plantImg" src="" alt="Dřevina"></div>
            </div>
            <div class="card-face card-back">
                <div class="cz-name" id="czName">---</div>
                <div class="lat-wrapper">
                    <div class="lat-name" id="latName">---</div>
                    <button class="btn-speak" onclick="speakCurrent(event)">🔊</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-circle" onclick="prevCard()">←</button>
        <button id="btn-wrong" class="btn-pill btn-wrong" onclick="mark(false)">✕</button>
        <button id="btn-correct" class="btn-pill btn-correct" onclick="mark(true)">✓</button>
        <button id="btn-next" class="btn-circle" onclick="nextCard()">→</button>
    </div>

    <div id="results-screen">
        <h1>🏆 Výsledek</h1>
        <div id="res-detail" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
        <button id="retry-errors-btn" class="btn-menu" style="border-color: var(--red); color: var(--red);" onclick="retryErrors()">Opakovat chyby</button>
        <button class="btn-menu" onclick="location.reload()" style="background:var(--dark-green); color:white;">Menu</button>
    </div>

            const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);
            const filtered = allDrevinData.filter(d => selectedCats.includes(d.cat));
            if (filtered.length === 0) return alert("Vyber aspoň jednu kategorii!");
            quizData = isRandom ? filtered.sort(() => 0.5 - Math.random()) : filtered;
            initQuiz();
        }

        function startFlow(amount) {
            amount = parseInt(amount) || allDrevinData.length;
            let data = [...allDrevinData];
            quizData = isRandom ? data.sort(() => 0.5 - Math.random()) : data;
            quizData = quizData.slice(0, Math.min(amount, quizData.length));
            initQuiz();
        }

        function initQuiz() {
            currentIndex = 0; answered = new Array(quizData.length).fill(null);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            const item = quizData[currentIndex];
            document.getElementById('mainCard').classList.remove('is-flipped');
            document.getElementById('plantImg').src = item.img;
            document.getElementById('czName').textContent = item.cz;
            document.getElementById('latName').textContent = item.lat;
            
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('btn-wrong').classList.toggle('active', answered[currentIndex] === false);
            document.getElementById('btn-correct').classList.toggle('active', answered[currentIndex] === true);
            document.getElementById('correct-count').textContent = `${answered.filter(a => a === true).length} ✓`;
            document.getElementById('wrong-count').textContent = `✕ ${answered.filter(a => a === false).length}`;
        }

        function mark(isCorrect) {
            answered[currentIndex] = isCorrect;
            updateUI();
            setTimeout(() => { checkAutoProgress(); }, 250);
        }

        function nextCard() { 
            if (currentIndex < quizData.length - 1) { currentIndex++; updateUI(); } 
            else { checkAutoProgress(); }
        }
        function prevCard() { if (currentIndex > 0) { currentIndex--; updateUI(); } }

        function checkAutoProgress() {
            const firstEmpty = answered.indexOf(null);
            if (firstEmpty === -1) {
                showResults();
            } else if (currentIndex >= quizData.length - 1 || answered[currentIndex] !== null) {
                currentIndex = firstEmpty; updateUI();
            } else {
                currentIndex++; updateUI();
            }
        }

        function speakCurrent(event) {
            event.stopPropagation();
            const utterance = new SpeechSynthesisUtterance(quizData[currentIndex].lat);
            utterance.lang = 'la'; utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function handleCardClick(event, card) {
            if (!event.target.closest('.btn-speak')) { card.classList.toggle('is-flipped'); }
        }

        function goHome() { if (confirm("Opravdu do menu?")) location.reload(); }
        
        function showResults() {
            let correct = answered.filter(a => a === true).length;
            document.getElementById('res-detail').innerHTML = `Věděla jsi: ${correct} / ${quizData.length}<br>Úspěšnost: ${Math.round((correct / quizData.length) * 100)}%`;
            document.getElementById('retry-errors-btn').style.display = (quizData.length - correct > 0) ? 'block' : 'none';
            document.getElementById('results-screen').style.display = 'flex';
        }

        function retryErrors() { 
            quizData = quizData.filter((_, i) => answered[i] === false); 
            initQuiz(); 
        }
        window.onload = updateCatCount;
    </script>
</body>
</html>
