
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Poznávačka Dřevin</title>
    <style>
        :root {
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #3498db;
            --dark-green: #2d5a27;
        }

        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 10px; min-height: 100vh; user-select: none; }
        
        #menu-screen { position: absolute; inset: 0; background: #f4f7f6; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .menu-title { color: var(--dark-green); margin-bottom: 15px; font-size: 2rem; }
        .menu-section { margin-bottom: 20px; width: 100%; max-width: 320px; }
        .menu-section p { font-weight: bold; margin-bottom: 10px; color: #555; }
        
        .mode-toggle { display: flex; gap: 5px; background: #ddd; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .btn-mode { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: transparent; transition: 0.3s; }
        .btn-mode.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--dark-green); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; }
        .btn-menu { padding: 12px; border-radius: 12px; border: 2px solid var(--dark-green); background: white; color: var(--dark-green); font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-menu:hover { background: var(--dark-green); color: white; }
        .full-width { grid-column: span 2; }
        
        input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ccc; text-align: center; font-size: 1.1rem; margin-bottom: 10px; box-sizing: border-box; }

        .header-stats { display: flex; gap: 8px; margin-bottom: 10px; font-weight: bold; }
        .stat-box { padding: 6px 12px; border-radius: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 1rem; min-width: 60px; text-align: center; }
        .stat-wrong { color: var(--red); border: 2px solid var(--red); }
        .stat-correct { color: var(--green); border: 2px solid var(--green); }
        .stat-current { color: var(--blue); border: 2px solid var(--blue); }

        .card-container { width: 320px; height: 420px; perspective: 1000px; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; background: white; border: 4px solid var(--dark-green); box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
        .img-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .drill-text { font-size: 1.8rem; font-weight: bold; color: var(--dark-green); text-align: center; }

        .card-back { transform: rotateY(180deg); background-color: #e8f5e9; text-align: center; }
        .cz-name { font-size: 1.6rem; font-weight: bold; color: #1b3d17; margin-bottom: 10px; }
        .lat-name { font-size: 1.2rem; font-style: italic; color: #555; border-top: 1px solid #ccc; padding-top: 10px; width: 85%; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--blue); background: white; color: var(--blue); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-pill { padding: 12px 30px; border-radius: 30px; background: white; font-size: 22px; cursor: pointer; border: 2px solid #ddd; }
        
        /* Barvy pro aktivní hodnocení */
        .btn-wrong.active { background: var(--red); color: white; border-color: var(--red); }
        .btn-correct.active { background: var(--green); color: white; border-color: var(--green); }
        .btn-wrong { color: var(--red); border-color: var(--red); }
        .btn-correct { color: var(--green); border-color: var(--green); }

        #results-screen { display: none; position: fixed; inset: 0; background: white; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; padding: 20px; }
        .result-row { display: flex; justify-content: space-between; width: 250px; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 class="menu-title">🌿 Poznávačka Dřevin</h1>
        
        <div class="menu-section">
            <p>Pořadí dřevin:</p>
            <div class="mode-toggle">
                <button id="mode-linear" class="btn-mode active" onclick="setOrder('linear')">Popořadě</button>
                <button id="mode-random" class="btn-mode" onclick="setOrder('random')">Náhodně</button>
            </div>
        </div>

        <div class="menu-section" style="border: 2px solid #f39c12; padding: 10px; border-radius: 15px;">
            <p style="color: #f39c12;">Textový Dril:</p>
            <div class="menu-grid">
                <button class="btn-menu" onclick="startQuiz(70, 'LAT_CZ')">Latina ➔ CZ</button>
                <button class="btn-menu" onclick="startQuiz(70, 'CZ_LAT')">CZ ➔ Latina</button>
            </div>
        </div>

        <div class="menu-section">
            <p>Zvolit počet obrázků:</p>
            <div class="menu-grid">
                <button class="btn-menu" onclick="startQuiz(10)">10</button>
                <button class="btn-menu" onclick="startQuiz(25)">25</button>
                <button class="btn-menu" onclick="startQuiz(50)">50</button>
                <button class="btn-menu" onclick="startQuiz(70)">Vše (70)</button>
            </div>
        </div>

        <div class="menu-section">
            <input type="number" id="customAmount" value="70">
            <button class="btn-menu full-width" onclick="startQuiz(document.getElementById('customAmount').value)">Spustit výběr</button>
        </div>
    </div>

    <div class="header-stats">
        <div class="stat-box stat-current" id="counter">1 / --</div>
        <div class="stat-box stat-wrong" id="wrong-count">✕ 0</div>
        <div class="stat-box stat-correct" id="correct-count">0 ✓</div>
    </div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="img-container">
                    <img id="plantImg" src="">
                    <div id="drillText" class="drill-text" style="display:none;"></div>
                </div>
            </div>
            <div class="card-face card-back">
                <div class="cz-name" id="czName">---</div>
                <div class="lat-name" id="latName">---</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-circle" onclick="prevCard()">←</button>
        <button id="btn-wrong" class="btn-pill btn-wrong" onclick="mark(false)">✕</button>
        <button id="btn-correct" class="btn-pill btn-correct" onclick="mark(true)">✓</button>
        <button class="btn-circle" onclick="nextCard()">→</button>
    </div>

    <div id="results-screen">
        <h1>🏆 Výsledek</h1>
        <div class="result-row"><span>Věděla:</span> <span id="res-correct" style="color:var(--green)">0</span></div>
        <div class="result-row"><span>Nevěděla:</span> <span id="res-wrong" style="color:var(--red)">0</span></div>
        <div class="result-row"><span>Úspěšnost:</span> <span id="res-pct" style="font-weight:bold">0%</span></div>
        <br>
        <button class="btn-menu" onclick="location.reload()">Zpět do menu</button>
    </div>

    <script>
        const allDrevinData = [
            { cz: "Jinan dvoulaločný", lat: "Ginkgo biloba", img: "jinan-dvoulalocny.jpg" },
            { cz: "Borovice lesní", lat: "Pinus sylvestris", img: "borovice-lesni.jpg" },
            { cz: "Borovice kleč", lat: "Pinus mugo", img: "borovice-klec.jpg" },
            { cz: "Borovice vejmutovka", lat: "Pinus strobus", img: "borovice-vejmutovka.jpg" },
            { cz: "Borovice černá", lat: "Pinus nigra", img: "borovice-cerna.jpg" },
            { cz: "Modřín opadavý", lat: "Larix decidua", img: "modrin-opadavy.jpg" },
            { cz: "Jedle bělokorá", lat: "Abies alba", img: "jedle-belokora.jpg" },
            { cz: "Smrk ztepilý", lat: "Picea abies", img: "smrk-ztepily.jpg" },
            { cz: "Smrk pichlavý", lat: "Picea pungens", img: "smrk-pichlavy.jpg" },
            { cz: "Douglaska tisolistá", lat: "Pseudotsuga menziesii", img: "douglaska-tisolista.jpg" },
            { cz: "Tis červený", lat: "Taxus baccata", img: "tis-cerveny.jpg" },
            { cz: "Jalovec obecný", lat: "Juniperus communis", img: "jalovec-obecny.jpg" },
            { cz: "Platan západní", lat: "Platanus occidentalis", img: "platan-zapadni.jpg" },
            { cz: "Dřišťál obecný", lat: "Berberis vulgaris", img: "dristal-obecny.jpg" },
            { cz: "Chmel otáčivý", lat: "Humulus lupulus", img: "chmel-otacivy.jpg" },
            { cz: "Jilm habrolistý", lat: "Ulmus minor", img: "jilm-habrolisty.jpg" },
            { cz: "Jilm horský", lat: "Ulmus glabra", img: "jilm-horsky.jpg" },
            { cz: "Jilm vaz", lat: "Ulmus laevis", img: "jilm-vaz.jpg" },
            { cz: "Buk lesní", lat: "Fagus sylvatica", img: "buk-lesni.jpg" },
            { cz: "Dub cer", lat: "Quercus cerris", img: "dub-cer.png" },
            { cz: "Dub červený", lat: "Quercus rubra", img: "dub-cerveny.jpg" },
            { cz: "Dub letní", lat: "Quercus robur", img: "dub-letni.jpg" },
            { cz: "Dub zimní", lat: "Quercus petraea", img: "dub-zimni.jpg" },
            { cz: "Ořešák královský", lat: "Juglans regia", img: "oresak-kralovsky.jpg" },
            { cz: "Bříza bělokorá", lat: "Betula pendula", img: "briza-belokora.jpg" },
            { cz: "Bříza pýřitá", lat: "Betula pubescens", img: "briza-pyrita.jpg" },
            { cz: "Olše lepkavá", lat: "Alnus glutinosa", img: "olse-lepkava.jpg" },
            { cz: "Olše šedá", lat: "Alnus incana", img: "olse-seda.jpg" },
            { cz: "Olše zelená", lat: "Alnus viridis", img: "olse-zelena.jpg" },
            { cz: "Habr obecný", lat: "Carpinus betulus", img: "habr-obecny.jpg" },
            { cz: "Líska obecná", lat: "Corylus avellana", img: "liska-obecna.jpg" },
            { cz: "Líska turecká", lat: "Corylus colurna", img: "liska-turecka.jpeg" },
            { cz: "Topol osika", lat: "Populus tremula", img: "topol-osika.jpg" },
            { cz: "Topol černý", lat: "Populus nigra", img: "topol-cerny.jpg" },
            { cz: "Vrba pětimužná", lat: "Salix pentandra", img: "vrba-petimuzna.png" },
            { cz: "Vrba křehká", lat: "Salix fragilis", img: "vrba-krehka.jpg" },
            { cz: "Vrba bílá", lat: "Salix alba", img: "vrba-bila.jpg" },
            { cz: "Vrba trojmužná", lat: "Salix triandra", img: "vrba-trojmuzna.jpg" },
            { cz: "Vrba nachová", lat: "Salix purpurea", img: "vrba-nachova.jpg" },
            { cz: "Vrba šedá", lat: "Salix elaeagnos", img: "vrba-seda.jpg" },
            { cz: "Vrba košíkářská", lat: "Salix viminalis", img: "vrba-kosikarska.jpg" },
            { cz: "Vrba jíva", lat: "Salix caprea", img: "vrba-jiva.jpg" },
            { cz: "Vrba ušatá", lat: "Salix aurita", img: "vrba-usata.jpg" },
            { cz: "Vrba popelavá", lat: "Salix cinerea", img: "vrba-popelava.jpg" },
            { cz: "Vrba bylinná", lat: "Salix herbacea", img: "vrba-bylinna.jpg" },
            { cz: "Plamének plotní", lat: "Clematis vitalba", img: "plamenek-plotni.jpg" },
            { cz: "Ostružiník maliník", lat: "Rubus idaeus", img: "ostruzinik-malinik.jpg" },
            { cz: "Ostružiník sivý", lat: "Rubus caesius", img: "ostruzinik-sivy.jpg" },
            { cz: "Ostružiník křovitý", lat: "Rubus fruticosus agg.", img: "ostruzinik-krovity.jpg" },
            { cz: "Růže šípková", lat: "Rosa sect caninae", img: "ruze-sipkova.jpg" },
            { cz: "Střemcha obecná", lat: "Padus avium", img: "stremcha-obecna.jpg" },
            { cz: "Třešeň ptačí", lat: "Cerasus avium", img: "tresen-ptaci.jpg" },
            { cz: "Trnka obecná", lat: "Prunus spinosa", img: "trnka-obecna.jpg" },
            { cz: "Skalník obecný", lat: "Cotoneaster integerrimus", img: "skalnik-obecny.jpg" },
            { cz: "Hrušeň obecná", lat: "Pyrus communis", img: "hrusen-obecna.jpg" },
            { cz: "Jeřáb ptačí", lat: "Sorbus aucuparia", img: "jerab-ptaci.jpg" },
            { cz: "Břek obecný", lat: "Sorbus torminalis", img: "brek-obecny.jpg" },
            { cz: "Muk obecný", lat: "Sorbus aria", img: "muk-obecny.jpg" },
            { cz: "Jabloň lesní", lat: "Malus sylvestris", img: "jablon-lesni.jpg" },
            { cz: "Hloh obecný", lat: "Crataegus laevigata", img: "hloh-obecny.jpg" },
            { cz: "Hloh jednoblizný", lat: "Crataegus monogyna", img: "hloh-jednoblizny.jpg" },
            { cz: "Janovec metlatý", lat: "Sarothamnus scoparius", img: "janovec-metlaty.jpg" },
            { cz: "Kručinka barvířská", lat: "Genista tinctoria", img: "krucinka-barvirska.jpg" },
            { cz: "Trnovník akát", lat: "Robinia pseudoacacia", img: "trnovnik-akat.jpg" },
            { cz: "Netvařec křovitý", lat: "Amorpha fruticosa", img: "netvarec-krovity.jpg" },
            { cz: "Židovník německý", lat: "Myricaria germanica", img: "zidovnik-nemecky.jpg" },
            { cz: "Vřes obecný", lat: "Calluna vulgaris", img: "vres-obecny.jpg" },
            { cz: "Rojovník bahenní", lat: "Ledum palustre", img: "rojovnik-bahenni.jpg" },
            { cz: "Brusinka obecná", lat: "Rhodococcus vitis-idaea", img: "brusinka-obecna.jpg" },
            { cz: "Borůvka černá", lat: "Vaccinium myrtillus", img: "boruvka-cerna.jpg" }
        ];

        let quizData = [];
        let currentIndex = 0;
        let answered = []; // null, true nebo false
        let isRandom = false;
        let mode = 'img'; // 'img', 'LAT_CZ', 'CZ_LAT'

        function setOrder(order) {
            isRandom = (order === 'random');
            document.getElementById('mode-linear').classList.toggle('active', !isRandom);
            document.getElementById('mode-random').classList.toggle('active', isRandom);
        }

        function startQuiz(amount, drillMode = 'img') {
            mode = drillMode;
            amount = parseInt(amount) || 70;
            quizData = isRandom ? [...allDrevinData].sort(() => 0.5 - Math.random()) : [...allDrevinData];
            quizData = quizData.slice(0, amount);
            
            currentIndex = 0;
            answered = new Array(quizData.length).fill(null);
            document.getElementById('menu-screen').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            const item = quizData[currentIndex];
            const card = document.getElementById('mainCard');
            card.classList.remove('is-flipped');

            // Přepnutí mezi obrázkem a textem
            if (mode === 'img') {
                document.getElementById('plantImg').style.display = 'block';
                document.getElementById('drillText').style.display = 'none';
                document.getElementById('plantImg').src = item.img;
            } else {
                document.getElementById('plantImg').style.display = 'none';
                document.getElementById('drillText').style.display = 'block';
                document.getElementById('drillText').textContent = (mode === 'LAT_CZ') ? item.lat : item.cz;
            }

            document.getElementById('czName').textContent = item.cz;
            document.getElementById('latName').textContent = item.lat;
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${quizData.length}`;

            // Reset a nastavení barev tlačítek
            document.getElementById('btn-wrong').classList.toggle('active', answered[currentIndex] === false);
            document.getElementById('btn-correct').classList.toggle('active', answered[currentIndex] === true);

            // Výpočet skóre
            let correct = answered.filter(a => a === true).length;
            let wrong = answered.filter(a => a === false).length;
            document.getElementById('correct-count').textContent = `${correct} ✓`;
            document.getElementById('wrong-count').textContent = `✕ ${wrong}`;
        }

        function mark(isCorrect) {
            answered[currentIndex] = isCorrect;
            updateUI();
            
            // Automatický posun
            if (currentIndex < quizData.length - 1) {
                setTimeout(() => {
                    if (answered[currentIndex] !== null) { // kontrola aby se neposunulo při rychlém kliku
                        currentIndex++;
                        updateUI();
                    }
                }, 300);
            } else {
                setTimeout(showResults, 500);
            }
        }

        function nextCard() { if (currentIndex < quizData.length - 1) { currentIndex++; updateUI(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; updateUI(); } }

        function showResults() {
            let correct = answered.filter(a => a === true).length;
            let wrong = answered.filter(a => a === false).length;
            document.getElementById('res-correct').textContent = correct;
            document.getElementById('res-wrong').textContent = wrong;
            document.getElementById('res-pct').textContent = Math.round((correct / quizData.length) * 100) + "%";
            document.getElementById('results-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
