<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Poznávačka Dřevin - Expert</title>
    <style>
        :root {
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #3498db;
            --dark-green: #2d5a27;
            --orange: #f39c12;
        }

        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding: 10px; min-height: 100vh; user-select: none; }
        
        #menu-screen { position: fixed; inset: 0; background: #f4f7f6; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; overflow-y: auto; }
        .menu-title { color: var(--dark-green); margin-bottom: 5px; font-size: 2rem; }
        
        .menu-section { margin-bottom: 15px; width: 100%; max-width: 340px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .menu-section p { font-weight: bold; margin-bottom: 10px; color: #555; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .global-settings { background: #eef2f3; border: 2px solid var(--blue); }

        .mode-toggle { display: flex; gap: 5px; background: #ddd; padding: 5px; border-radius: 12px; margin-bottom: 5px; }
        .btn-mode { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: transparent; transition: 0.3s; }
        .btn-mode.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--blue); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-menu { padding: 12px; border-radius: 12px; border: 2px solid var(--dark-green); background: white; color: var(--dark-green); font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-menu:hover { background: var(--dark-green); color: white; }
        .full-width { grid-column: span 2; }
        
        .checkbox-group { text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer; padding: 5px; background: #fafafa; border-radius: 8px; }
        .checkbox-item input { transform: scale(1.2); }

        input[type="number"] { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #ccc; text-align: center; font-size: 1.1rem; box-sizing: border-box; margin-top: 5px; }

        .header-stats { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-weight: bold; }
        .stat-box { padding: 6px 12px; border-radius: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.9rem; min-width: 50px; text-align: center; }
        .btn-home { background: white; border: 2px solid #ccc; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        
        .stat-wrong { color: var(--red); border: 2px solid var(--red); }
        .stat-correct { color: var(--green); border: 2px solid var(--green); }
        .stat-current { color: var(--blue); border: 2px solid var(--blue); }

        .card-container { width: 320px; height: 420px; perspective: 1000px; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; background: white; border: 4px solid var(--dark-green); box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
        .img-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .drill-text { font-size: 1.8rem; font-weight: bold; color: var(--dark-green); text-align: center; }
        .card-back { transform: rotateY(180deg); background-color: #e8f5e9; text-align: center; }
        .cz-name { font-size: 1.6rem; font-weight: bold; color: #1b3d17; margin-bottom: 10px; }
        .lat-name { font-size: 1.2rem; font-style: italic; color: #555; border-top: 1px solid #ccc; padding-top: 10px; width: 85%; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--blue); background: white; color: var(--blue); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-pill { padding: 10px 25px; border-radius: 30px; background: white; font-size: 20px; cursor: pointer; border: 2px solid #ddd; min-width: 70px; }
        
        .btn-wrong.active { background: var(--red); color: white; border-color: var(--red); }
        .btn-correct.active { background: var(--green); color: white; border-color: var(--green); }
        
        #results-screen { display: none; position: fixed; inset: 0; background: white; flex-direction: column; align-items: center; justify-content: center; z-index: 300; text-align: center; padding: 20px; }
        .result-row { display: flex; justify-content: space-between; width: 250px; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1 class="menu-title">🌿 Poznávačka Dřevin</h1>
        
        <div class="menu-section global-settings">
            <p>1. Nastavení pořadí (pro vše):</p>
            <div class="mode-toggle">
                <button id="mode-linear" class="btn-mode active" onclick="setOrder('linear')">Popořadě</button>
                <button id="mode-random" class="btn-mode" onclick="setOrder('random')">Náhodně</button>
            </div>
        </div>

        <div class="menu-section" style="border: 2px solid var(--orange);">
            <p style="color: var(--orange);">2. Slovník / Dril slovíček:</p>
            <div class="menu-grid">
                <button class="btn-menu" style="border-color: var(--orange); color: var(--orange);" onclick="startFlow('LAT_CZ')">Latina ➔ CZ</button>
                <button class="btn-menu" style="border-color: var(--orange); color: var(--orange);" onclick="startFlow('CZ_LAT')">CZ ➔ Latina</button>
            </div>
        </div>

        <div class="menu-section">
            <p>3. Poznávačka z obrázků:</p>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="jehličnany" checked onchange="updateCatCount()"> Jehličnany</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="listnáče" checked onchange="updateCatCount()"> Listnáče</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="ovoce" checked onchange="updateCatCount()"> Ovocné</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="keře" checked onchange="updateCatCount()"> Keře</label>
                <label class="checkbox-item"><input type="checkbox" class="cat-check" value="vrby" checked onchange="updateCatCount()"> Vrby/Jilmy</label>
            </div>
            <button id="btn-start-custom" class="btn-menu full-width" style="background: var(--dark-green); color: white;" onclick="startCustom()">
                Spustit výběr (Počet: 70)
            </button>
        </div>

        <div class="menu-section">
            <p>Vlastní počet (max. 100):</p>
            <input type="number" id="customAmount" value="70">
            <button class="btn-menu full-width" style="margin-top:10px;" onclick="startFlow('img', document.getElementById('customAmount').value)">Spustit vlastní počet</button>
            <button class="btn-menu full-width" style="margin-top:10px; background: #34495e; color: white; border: none;" onclick="startFlow('img', 70)">Spustit vše (70)</button>
        </div>
    </div>

    <div class="header-stats">
        <button class="btn-home" onclick="goHome()">🏠</button>
        <div class="stat-box stat-current" id="counter">1 / --</div>
        <div class="stat-box stat-wrong" id="wrong-count">✕ 0</div>
        <div class="stat-box stat-correct" id="correct-count">0 ✓</div>
    </div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="img-container">
                    <img id="plantImg" src="">
                    <div id="drillText" class="drill-text" style="display:none;"></div>
                </div>
            </div>
            <div class="card-face card-back">
                <div class="cz-name" id="czName">---</div>
                <div class="lat-name" id="latName">---</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-circle" onclick="prevCard()">←</button>
        <button id="btn-wrong" class="btn-pill btn-wrong" onclick="mark(false)">✕</button>
        <button id="btn-correct" class="btn-pill btn-correct" onclick="mark(true)">✓</button>
        <button id="btn-next" class="btn-circle" onclick="nextCard()">→</button>
    </div>

    <div id="results-screen">
        <h1>🏆 Výsledek</h1>
        <div class="result-row"><span>Věděla:</span> <span id="res-correct" style="color:var(--green)">0</span></div>
        <div class="result-row"><span>Nevěděla:</span> <span id="res-wrong" style="color:var(--red)">0</span></div>
        <div class="result-row"><span>Úspěšnost:</span> <span id="res-pct" style="font-weight:bold">0%</span></div>
        <br>
        <button id="retry-errors-btn" class="btn-menu" style="border-color: var(--red); color: var(--red); margin-bottom: 10px;" onclick="retryErrors()">Opakovat jen chyby</button>
        <button class="btn-menu" onclick="location.reload()" style="background:var(--dark-green); color:white;">Zpět do menu</button>
    </div>

    <script>

            { cz: "Topol černý", lat: "Populus nigra", img: "topol-cerny.jpg", cat: "listnáče" },

            { cz: "Vrba pětimužná", lat: "Salix pentandra", img: "vrba-petimuzna.png", cat: "vrby" },
            { cz: "Vrba křehká", lat: "Salix fragilis", img: "vrba-krehka.jpg", cat: "vrby" },
            { cz: "Vrba bílá", lat: "Salix alba", img: "vrba-bila.jpg", cat: "vrby" },
            { cz: "Vrba trojmužná", lat: "Salix triandra", img: "vrba-trojmuzna.jpg" , cat: "vrby"},
            { cz: "Vrba nachová", lat: "Salix purpurea", img: "vrba-nachova.jpg", cat: "vrby" },

            { cz: "Hloh jednoblizný", lat: "Crataegus monogyna", img: "hloh-jednoblizny.jpg", cat: "keře" },
            { cz: "Janovec metlatý", lat: "Sarothamnus scoparius", img: "janovec-metlaty.jpg", cat: "keře" },
            { cz: "Kručinka barvířská", lat: "Genista tinctoria", img: "krucinka-barvirska.jpg", cat: "keře" },
            { cz: "Netvařec křovitý", lat: "Amorpha fruticosa", img: "netvarec-krovity.jpg", cat: "keře" },
            { cz: "Židovník německý", lat: "Myricaria germanica", img: "zidovnik-nemecky.jpg", cat: "keře" },
            { cz: "Vřes obecný", lat: "Calluna vulgaris", img: "vres-obecny.jpg", cat: "keře" },
            { cz: "Rojovník bahenní", lat: "Ledum palustre", img: "rojovnik-bahenni.jpg", cat: "keře" },
            { cz: "Brusinka obecná", lat: "Rhodococcus vitis-idaea", img: "brusinka-obecna.jpg", cat: "keře" },
            { cz: "Borůvka černá", lat: "Vaccinium myrtillus", img: "boruvka-cerna.jpg", cat: "keře" }
        ];

        let quizData = [], currentIndex = 0, answered = [], isRandom = false, mode = 'img';

        function setOrder(order) {
            isRandom = (order === 'random');
            document.getElementById('mode-linear').classList.toggle('active', !isRandom);
            document.getElementById('mode-random').classList.toggle('active', isRandom);
        }

        function updateCatCount() {
            const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);
            const count = allDrevinData.filter(d => selectedCats.includes(d.cat)).length;
            document.getElementById('btn-start-custom').textContent = `Spustit výběr (Počet: ${count})`;
        }

        function startCustom() {
            const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);
            const filtered = allDrevinData.filter(d => selectedCats.includes(d.cat));
            if (filtered.length === 0) return alert("Musíš vybrat aspoň jednu kategorii!");
            mode = 'img';
            quizData = isRandom ? filtered.sort(() => 0.5 - Math.random()) : filtered;
            initQuiz();
        }

        function startFlow(m, amount) {
            mode = m;
            amount = parseInt(amount) || allDrevinData.length;
            const limit = Math.min(allDrevinData.length, 100);
            if (amount > limit) amount = limit;
            quizData = isRandom ? [...allDrevinData].sort(() => 0.5 - Math.random()) : [...allDrevinData];
            quizData = quizData.slice(0, amount);
            initQuiz();
        }

        function initQuiz() {
            currentIndex = 0; answered = new Array(quizData.length).fill(null);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            const item = quizData[currentIndex];
            const card = document.getElementById('mainCard'); card.classList.remove('is-flipped');
            if (mode === 'img') {
                document.getElementById('plantImg').style.display = 'block'; document.getElementById('drillText').style.display = 'none';
                document.getElementById('plantImg').src = item.img;
            } else {
                document.getElementById('plantImg').style.display = 'none'; document.getElementById('drillText').style.display = 'block';
                document.getElementById('drillText').textContent = (mode === 'LAT_CZ') ? item.lat : item.cz;
            }
            document.getElementById('czName').textContent = item.cz; document.getElementById('latName').textContent = item.lat;
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('btn-wrong').classList.toggle('active', answered[currentIndex] === false);
            document.getElementById('btn-correct').classList.toggle('active', answered[currentIndex] === true);
            document.getElementById('correct-count').textContent = `${answered.filter(a => a === true).length} ✓`;
            document.getElementById('wrong-count').textContent = `✕ ${answered.filter(a => a === false).length}`;
        }

        function mark(isCorrect) {
            answered[currentIndex] = isCorrect; updateUI();
            setTimeout(() => { if (currentIndex < quizData.length - 1) nextCard(); else checkFinished(); }, 300);
        }
        function nextCard() { if (currentIndex < quizData.length - 1) { currentIndex++; updateUI(); } else checkFinished(); }
        function prevCard() { if (currentIndex > 0) { currentIndex--; updateUI(); } }
        function checkFinished() {
            const firstEmpty = answered.indexOf(null);
            if (firstEmpty === -1) showResults();
            else { alert("Musíš označit všechny položky!"); currentIndex = firstEmpty; updateUI(); }
        }
        function goHome() { if (confirm("Vrátit se do menu?")) location.reload(); }
        function showResults() {
            let correct = answered.filter(a => a === true).length;
            document.getElementById('res-correct').textContent = correct;
            document.getElementById('res-wrong').textContent = quizData.length - correct;
            document.getElementById('res-pct').textContent = Math.round((correct / quizData.length) * 100) + "%";
            document.getElementById('retry-errors-btn').style.display = (quizData.length - correct > 0) ? 'block' : 'none';
            document.getElementById('results-screen').style.display = 'flex';
        }
        function retryErrors() { quizData = quizData.filter((_, i) => answered[i] === false); initQuiz(); }

        window.onload = updateCatCount;
    </script>
</body>
</html>
